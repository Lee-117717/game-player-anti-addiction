# ============================================================================
# 游戏平台玩家行为分析与防沉迷系统
# Flume 双链路采集配置: exec → memory channel → replicating → Kafka + HDFS
# 版本: Flume 1.9.0 / Kafka 3.6.2 (KRaft) / Hadoop 3.x
# ============================================================================
# 数据流架构:
#   /tmp/game_player.log  →  exec source (r1)  →  replicating selector
#                                                    ├── channel c1 → KafkaSink k1 (实时流)
#                                                    └── channel c2 → HdfsSink  k2 (离线存储)
# ============================================================================

# ============================================================================
# Agent 定义
# ============================================================================
a1.sources  = r1
a1.channels = c1 c2
a1.sinks    = k1 k2

# ============================================================================
# Source: exec 实时采集 /tmp/game_player.log
# ============================================================================
a1.sources.r1.type = exec
# tail -F: 文件被删除/轮转后自动重新追踪
a1.sources.r1.command = tail -F -n +1 /home/hadoop/game_player_anti_addiction/logs/game_player_behavior.log
a1.sources.r1.shell = /bin/bash -c
a1.sources.r1.batchSize = 100
a1.sources.r1.batchTimeout = 3000
a1.sources.r1.restartThrottle = 5000
# restart=true: 重启 Flume 时从文件末尾读取，仅处理新增数据
a1.sources.r1.restart = true
a1.sources.r1.logStdErr = false

# ============================================================================
# 拦截器: 打时间戳 + 主机名
# ============================================================================
a1.sources.r1.interceptors = i1 i2
a1.sources.r1.interceptors.i1.type = timestamp
a1.sources.r1.interceptors.i1.preserveExisting = false
a1.sources.r1.interceptors.i2.type = host
a1.sources.r1.interceptors.i2.preserveExisting = false
a1.sources.r1.interceptors.i2.hostHeader = hostname

# ============================================================================
# Channel Selector: replicating — 每条 Event 同时复制到两个 Channel
# ============================================================================
a1.sources.r1.selector.type = replicating
a1.sources.r1.channels = c1 c2

# ============================================================================
# Channel c1 — Memory Channel (→ Kafka)
# ============================================================================
a1.channels.c1.type = memory
a1.channels.c1.capacity = 100000
a1.channels.c1.transactionCapacity = 10000
a1.channels.c1.byteCapacityBufferPercentage = 20
a1.channels.c1.byteCapacity = 268435456
a1.channels.c1.keep-alive = 3

# ============================================================================
# Channel c2 — Memory Channel (→ HDFS)
# ============================================================================
a1.channels.c2.type = memory
a1.channels.c2.capacity = 100000
a1.channels.c2.transactionCapacity = 10000
a1.channels.c2.byteCapacityBufferPercentage = 20
a1.channels.c2.byteCapacity = 268435456
a1.channels.c2.keep-alive = 3

# ============================================================================
# Sink k1 — KafkaSink (写入 Kafka Topic: game-player-log)
# ============================================================================
a1.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.k1.channel = c1
# 单机 Kafka KRaft 模式，端口 9092
a1.sinks.k1.kafka.bootstrap.servers = localhost:9092
a1.sinks.k1.kafka.topic = game-player-log
# Flume Event Body 是 byte[]，必须用 ByteArraySerializer
a1.sinks.k1.kafka.producer.key.serializer = org.apache.kafka.common.serialization.StringSerializer
a1.sinks.k1.kafka.producer.value.serializer = org.apache.kafka.common.serialization.ByteArraySerializer
a1.sinks.k1.kafka.producer.acks = 1
a1.sinks.k1.kafka.producer.batch.size = 16384
a1.sinks.k1.kafka.producer.linger.ms = 5
a1.sinks.k1.kafka.producer.retries = 3
a1.sinks.k1.kafka.producer.request.timeout.ms = 30000
a1.sinks.k1.kafka.producer.compression.type = snappy
a1.sinks.k1.useFlumeEventFormat = false

# ============================================================================
# Sink k2 — HdfsSink (落地到 HDFS /game/logs/ 按日期分区)
# ============================================================================
a1.sinks.k2.type = hdfs
a1.sinks.k2.channel = c2
# hdfs:/// 使用 Hadoop 默认文件系统（core-site.xml 中配置的 fs.defaultFS）
a1.sinks.k2.hdfs.path = hdfs:///user/flume/game_logs/dt=%Y%m%d
a1.sinks.k2.hdfs.filePrefix = game_player_behavior
a1.sinks.k2.hdfs.fileSuffix = .log
a1.sinks.k2.hdfs.fileType = DataStream
a1.sinks.k2.hdfs.writeFormat = Text
a1.sinks.k2.hdfs.useLocalTimeStamp = true
# 文件滚动策略
a1.sinks.k2.hdfs.rollSize = 134217728
a1.sinks.k2.hdfs.rollCount = 100000
a1.sinks.k2.hdfs.rollInterval = 600
a1.sinks.k2.hdfs.idleTimeout = 360
a1.sinks.k2.hdfs.batchSize = 10000
a1.sinks.k2.hdfs.callTimeout = 30000
a1.sinks.k2.hdfs.threadsPoolSize = 10
a1.sinks.k2.hdfs.retryInterval = 180
a1.sinks.k2.hdfs.round = true
a1.sinks.k2.hdfs.roundValue = 1
a1.sinks.k2.hdfs.roundUnit = minute
a1.sinks.k2.hdfs.maxOpenFiles = 5000
a1.sinks.k2.hdfs.closeTries = 0
