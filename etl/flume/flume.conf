# ============================================================================
# 游戏平台玩家行为分析与防沉迷系统
# Flume 1.9.0 数据采集配置文件
# ============================================================================
# 架构说明:
#   Python日志生成器 → Flume(Taildir Source) → Memory Channel(Replicating)
#                                                   ├── Kafka Sink → Kafka Topic
#                                                   └── HDFS Sink  → HDFS按日期存储
#
# 功能:
#   1. 实时监控本地玩家行为日志文件增量
#   2. 数据通过内存通道稳定传输
#   3. 一份数据同时写入Kafka(实时流处理)和HDFS(离线批处理)
#   4. HDFS按日期分目录，文件滚动策略合理避免小文件
# ============================================================================

# ============================================================================
# Agent 定义
# a1: agent 名称，可自定义，需与后续组件前缀一致
# ============================================================================
a1.sources  = r1                              # 定义 Source 名称
a1.channels = c1 c2                            # 定义两个 Channel: c1→Kafka, c2→HDFS
a1.sinks    = k1 k2                            # 定义两个 Sink:   k1→Kafka,  k2→HDFS

# ============================================================================
# 一、Source 配置 - Taildir Source（文件增量监控）
# ============================================================================
# Taildir Source 优势:
#   - 支持断点续传：通过positionFile记录文件读取位置，重启不丢数据
#   - 支持多文件：可用正则匹配多个文件
#   - 比Exec Source更可靠，比SpoolDir更灵活(无需滚动文件)
# ============================================================================

a1.sources.r1.type = TAILDIR
# position文件路径：记录每个被监控文件的读取偏移量，重启后从此位置继续
a1.sources.r1.positionFile = /home/hadoop/game_player_anti_addiction/flume/position/taildir_position.json
# 监控的文件组，支持多个文件组（逗号分隔）
a1.sources.r1.filegroups = f1
# f1组监控的文件路径，支持通配符，监控logs目录下所有.log文件
a1.sources.r1.filegroups.f1 = /home/hadoop/game_player_anti_addiction/logs/*.log
# 文件字符编码
a1.sources.r1.filegroups.f1.inputCharset = UTF-8
# 是否从文件末尾开始读取（true=跳过存量数据只读增量，false=从头读）
a1.sources.r1.filegroups.f1.tail-dir = true
# 文件写入完成后的空闲时间(毫秒)才关闭文件句柄，防止文件还在写入时误关
a1.sources.r1.filegroups.f1.idle-timeout = 30000
# 扫描新文件/检测变化的间隔(毫秒)
a1.sources.r1.filegroups.f1.scan-interval = 5000
# 是否递归扫描子目录
a1.sources.r1.filegroups.f1.recursive = false

# ============================================================================
# 拦截器配置 - 可选: 为每行数据添加时间戳和主机名头信息
# ============================================================================
# Timestamp Interceptor: 在Event Header中加入处理时间戳
a1.sources.r1.interceptors = i1 i2
a1.sources.r1.interceptors.i1.type = timestamp
a1.sources.r1.interceptors.i1.preserveExisting = false

# Host Interceptor: 在Event Header中加入当前Agent主机名/IP
a1.sources.r1.interceptors.i2.type = host
a1.sources.r1.interceptors.i2.preserveExisting = false
a1.sources.r1.interceptors.i2.hostHeader = hostname

# ============================================================================
# 二、Channel 配置 - Memory Channel（内存通道）
# ============================================================================
# Memory Channel 特点:
#   - 数据存储在内存队列中，吞吐量高
#   - 适合数据量适中、对延迟敏感的场景
#   - 缺点：Agent宕机会丢失内存中未下沉的数据（通过双通道+Sink组降低风险）
# ============================================================================

# ----- c1: Kafka 通道 -----
a1.channels.c1.type = memory
# 通道中允许的最大Event数量
a1.channels.c1.capacity = 100000
# 每次从Source批量放入通道的Event数量
a1.channels.c1.transactionCapacity = 10000
# 通道中Event占用内存百分比阈值，超过则阻塞Source写入(0~1)
a1.channels.c1.byteCapacityBufferPercentage = 20
# 通道最大内存字节数(默认约为JVM堆的80%)
a1.channels.c1.byteCapacity = 268435456
# 是否可以丢弃数据(容量满时)
a1.channels.c1.keep-alive = 3

# ----- c2: HDFS 落地通道 -----
a1.channels.c2.type = memory
a1.channels.c2.capacity = 100000
a1.channels.c2.transactionCapacity = 10000
a1.channels.c2.byteCapacityBufferPercentage = 20
a1.channels.c2.byteCapacity = 268435456
a1.channels.c2.keep-alive = 3

# ============================================================================
# 三、Channel Selector - Replicating（复制模式）
# ============================================================================
# 将Source采集的每条Event同时复制到c1和c2两个通道
# c1 → Kafka Sink (实时流处理)
# c2 → HDFS Sink  (离线存储)
a1.sources.r1.selector.type = replicating
a1.sources.r1.channels = c1 c2

# ============================================================================
# 四、Sink 配置
# ============================================================================

# ============================================================================
# Sink k1 - Kafka Sink（写入Kafka集群）
# ============================================================================
a1.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
# Kafka Broker 集群地址（多节点逗号分隔，根据实际环境修改）
a1.sinks.k1.kafka.bootstrap.servers = kafka-node1:9092,kafka-node2:9092,kafka-node3:9092
# 目标 Kafka Topic 名称
a1.sinks.k1.kafka.topic = game_player_behavior
# Kafka 消息序列化格式，保留原始日志行
a1.sinks.k1.kafka.serializer.class = kafka.serializer.StringEncoder
# 生产者acks级别: all=所有副本确认，-1等同all，1=leader确认，0=不等确认
a1.sinks.k1.kafka.producer.acks = 1
# 批量发送大小(字节)
a1.sinks.k1.kafka.producer.batch.size = 16384
# 发送失败重试次数
a1.sinks.k1.kafka.producer.retries = 3
# 发送超时时间(毫秒)
a1.sinks.k1.kafka.producer.request.timeout.ms = 30000
# 压缩类型: none/gzip/snappy/lz4
a1.sinks.k1.kafka.producer.compression.type = snappy
# 自定义Flume Event Header中需要传递到Kafka的属性（逗号分隔）
a1.sinks.k1.custom.header.headerName1 = timestamp
a1.sinks.k1.custom.header.headerName2 = hostname

# ============================================================================
# Sink k2 - HDFS Sink（落地到HDFS）
# ============================================================================
a1.sinks.k2.type = hdfs
# HDFS存储根路径（根据实际Hadoop集群NameNode地址修改）
# 路径中的%Y%m%d会被替换为当前日期，实现按日分目录存储
a1.sinks.k2.hdfs.path = hdfs://hadoop:9000/user/flume/game_logs/dt=%Y%m%d
# 文件前缀
a1.sinks.k2.hdfs.filePrefix = game_player_behavior
# 文件后缀（建议不设置压缩后缀，由后续流程决定）
a1.sinks.k2.hdfs.fileSuffix = .log
# 文件类型: DataStream=普通文本, CompressedStream=压缩流
a1.sinks.k2.hdfs.fileType = DataStream
# 输出格式: %{body}表示输出Event Body(原始日志行)
a1.sinks.k2.hdfs.writeFormat = Text

# ---- 文件滚动策略 ----
# 以下任一条件满足即触发文件关闭，新数据写入新文件
# 滚动文件大小(字节): 128MB — 与HDFS块大小对齐，避免小文件
a1.sinks.k2.hdfs.rollSize = 134217728
# 滚动条数: 100000条Event — 数据量达到即滚动
a1.sinks.k2.hdfs.rollCount = 100000
# 滚动时间间隔(秒): 600秒=10分钟 — 超时未完成则强制滚动
a1.sinks.k2.hdfs.rollInterval = 600
# 空闲超时(秒): 360秒=6分钟 — 无新数据到达后关闭文件
a1.sinks.k2.hdfs.idleTimeout = 360

# ---- HDFS 写入控制 ----
# 批量写入大小(Event数量)，攒够一批再写，减少HDFS NameNode压力
a1.sinks.k2.hdfs.batchSize = 10000
# 写入HDFS的超时时间(毫秒)
a1.sinks.k2.hdfs.callTimeout = 30000
# 线程池大小
a1.sinks.k2.hdfs.threadsPoolSize = 10
# 重试次数
a1.sinks.k2.hdfs.maxOpenFiles = 5000
# 是否使用本地时间戳作为文件创建时间
a1.sinks.k2.hdfs.useLocalTimeStamp = true
# 时间四舍五入(秒): 用于确定HDFS路径中的时间
a1.sinks.k2.hdfs.round = true
a1.sinks.k2.hdfs.roundValue = 1
a1.sinks.k2.hdfs.roundUnit = minute
# close前的等待时间(毫秒)
a1.sinks.k2.hdfs.closeTries = 0
# 重试间隔(秒)
a1.sinks.k2.hdfs.retryInterval = 180

# ---- HDFS 压缩配置（可选，节省存储） ----
# 如需GZip压缩，取消下面两行注释
# a1.sinks.k2.hdfs.codeC = gzip
# a1.sinks.k2.hdfs.fileType = CompressedStream

# ============================================================================
# 五、Sink Group 配置（可选: 故障转移）
# ============================================================================
# 若需要Kafka Sink不可用时自动降级到文件Sink，可启用以下配置
# 此处保持简单，不做Sink Group，两个Sink独立工作

# ============================================================================
# Flume Agent JVM 参数建议（启动时通过 -D 参数或 JAVA_OPTS 指定）
# ============================================================================
# -Xms512m -Xmx2048m         : 堆内存初始512MB最大2GB，根据吞吐量调整
# -XX:+UseG1GC                : 使用G1垃圾回收器，适合大堆内存
# -XX:MaxGCPauseMillis=200    : G1最大GC暂停时间
# -Duser.timezone=Asia/Shanghai : 设置时区为上海，影响HDFS目录日期
